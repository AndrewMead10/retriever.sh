services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-SQtAQnz6tG/g5708tAZSNhDCzYlT23WJ1FKT76pbRF8=}"
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    image: ${RETRIEVER_IMAGE:-dysondunbar/retriever:latest}
    env_file:
      - .env
    environment:
      DATABASE_URL: ${APP_DATABASE_URL:-postgresql+psycopg://postgres:SQtAQnz6tG/g5708tAZSNhDCzYlT23WJ1FKT76pbRF8=@db:5432/rag}
      VESPA_ENDPOINT: ${APP_VESPA_ENDPOINT:-http://vespa:8080}
    ports:
      - "5656:5656"
    depends_on:
      db:
        condition: service_healthy
      vespa:
        condition: service_healthy
    restart: unless-stopped

  vespa:
    image: vespaengine/vespa
    hostname: vespa
    ports:
      - "8080:8080"
      - "19071:19071"
    volumes:
      - vespa-data:/opt/vespa/var
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:19071/state/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  vespa-init:
    image: alpine:latest
    hostname: vespa-init
    command: /scripts/deploy-vespa.sh
    volumes:
      - ./vespa:/app/vespa:ro
      - ./scripts:/scripts:ro
    depends_on:
      vespa:
        condition: service_healthy
    restart: "no"

volumes:
  postgres-data:
  vespa-data:
